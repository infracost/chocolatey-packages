name: Release v2
on:
  workflow_dispatch:
  repository_dispatch:
    types: [infracost2_choco]

jobs:
  build:
    name: Release Infracost CLI v2 choco
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - name: Generate & push
        run: infracost2/build.ps1
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}