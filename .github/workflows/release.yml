name: Release
on:
  workflow_dispatch:
  repository_dispatch:
    types: [infracost_choco]

jobs:
  build-v1:
    name: Release Infracost CLI v1 choco
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - name: Generate & push
        run: infracost1/build.ps1
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
